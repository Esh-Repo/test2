<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS Glass Cam Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.25);
            --accent: #007AFF;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            font-family: -apple-system, system-ui, sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Permission Overlay */
        #setup-screen {
            position: fixed; inset: 0;
            background: #111;
            z-index: 100;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }

        .btn-primary {
            background: var(--accent);
            color: white; border: none;
            padding: 15px 40px; border-radius: 30px;
            font-size: 1.1rem; font-weight: 600;
            cursor: pointer; transition: transform 0.2s;
        }

        /* Layout */
        #app-container {
            display: flex; flex-direction: column;
            height: 100vh; width: 100vw;
            display: none; /* Hidden until started */
        }

        #camera-view {
            flex: 1; position: relative;
            background: #000; overflow: hidden;
        }

        video {
            width: 100%; height: 100%; object-fit: cover;
        }

        /* Glassmorphic UI */
        #bottom-panel {
            position: absolute;
            bottom: 25px; left: 50%;
            transform: translateX(-50%);
            width: 92%; max-width: 450px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 15px;
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10;
        }

        #mini-map {
            width: 75px; height: 75px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            flex-shrink: 0;
        }

        .info-text { flex: 1; }
        .info-text h2 { margin: 0; font-size: 1rem; color: #fff; }
        .info-text p { margin: 3px 0 0; font-size: 0.7rem; opacity: 0.8; font-family: monospace; }

        /* Capture Controls */
        #controls {
            position: absolute;
            bottom: 150px; width: 100%;
            display: flex; justify-content: center;
            pointer-events: none;
        }

        #shutter-btn {
            width: 72px; height: 72px;
            background: white; border-radius: 50%;
            border: 6px solid rgba(255,255,255,0.3);
            pointer-events: auto;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        #shutter-btn:active { transform: scale(0.9); }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="setup-screen">
    <h1 style="margin-bottom: 10px;">GPS Camera</h1>
    <p style="opacity: 0.7; margin-bottom: 30px;">Requires Camera & Location access</p>
    <button class="btn-primary" onclick="startApp()">Enable Lens</button>
</div>

<div id="app-container">
    <div id="camera-view">
        <video id="video" autoplay playsinline muted></video>
        
        <div id="controls">
            <button id="shutter-btn"></button>
        </div>

        <div id="bottom-panel">
            <div id="mini-map"></div>
            <div class="info-text">
                <h2 id="addr">Locating...</h2>
                <p id="lat-long">0.0000, 0.0000</p>
                <p id="date-time">-- : --</p>
            </div>
        </div>
    </div>
</div>

<canvas id="snapshot"></canvas>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, marker;
    const video = document.getElementById('video');

    async function startApp() {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('app-container').style.display = 'flex';
        
        // 1. Start Camera
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { 
                    facingMode: "environment",
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                }
            });
            video.srcObject = stream;
            video.play();
        } catch (err) {
            alert("Camera Error: " + err.message + "\nCheck site settings to allow camera.");
        }

        // 2. Start GPS
        initGPS();
    }

    function initGPS() {
        if (!navigator.geolocation) return alert("GPS not supported");

        navigator.geolocation.watchPosition(async (pos) => {
            const { latitude, longitude } = pos.coords;
            document.getElementById('lat-long').innerText = `${latitude.toFixed(5)}°, ${longitude.toFixed(5)}°`;
            document.getElementById('date-time').innerText = new Date().toLocaleString();

            if (!map) {
                map = L.map('mini-map', { zoomControl: false, attributionControl: false }).setView([latitude, longitude], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                marker = L.marker([latitude, longitude]).addTo(map);
            } else {
                map.setView([latitude, longitude]);
                marker.setLatLng([latitude, longitude]);
            }

            // Reverse Geocode
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                const data = await res.json();
                document.getElementById('addr').innerText = data.display_name.split(',')[0] + ", " + (data.address.city || data.address.state || "");
            } catch (e) { document.getElementById('addr').innerText = "Location Found"; }
            
        }, (err) => console.log(err), { enableHighAccuracy: true });
    }

    document.getElementById('shutter-btn').onclick = () => {
        const canvas = document.getElementById('snapshot');
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        // Draw Frame
        ctx.drawImage(video, 0, 0);

        // Glass Overlay Emulation on saved pic
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(0, canvas.height - 200, canvas.width, 200);
        
        ctx.fillStyle = "white";
        ctx.font = "bold 40px sans-serif";
        ctx.fillText(document.getElementById('addr').innerText, 40, canvas.height - 110);
        
        ctx.font = "30px monospace";
        ctx.fillText(document.getElementById('lat-long').innerText, 40, canvas.height - 60);
        ctx.fillText(document.getElementById('date-time').innerText, 40, canvas.height - 25);

        // Save
        const link = document.createElement('a');
        link.download = `GPS_IMG_${Date.now()}.jpg`;
        link.href = canvas.toDataURL('image/jpeg', 0.9);
        link.click();
    };
</script>
</body>
</html>
