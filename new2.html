<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GPS Cam Pro v4.3</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --glass: rgba(0, 0, 0, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #007AFF;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white; overflow: hidden;
        }

        #viewport { 
            position: relative; 
            width: 100vw; 
            height: 100vh;
            overflow: hidden; 
        }
        
        video { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 0.1s ease-out;
        }

        /* Photo Stream Sidebar - Adjusted for full-width bottom */
        #sidebar {
            position: absolute; right: 10px; top: 50px; bottom: 320px;
            width: 75px; display: flex; flex-direction: column; gap: 10px;
            overflow-y: auto; z-index: 100; scrollbar-width: none;
        }
        .thumb {
            width: 65px; height: 65px; border-radius: 10px; border: 2px solid #fff;
            object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease;
        }

        /* Full Width Lower Area Dashboard */
        #bottom-dashboard {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            background: var(--glass);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid var(--border);
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 50;
            display: flex; flex-direction: column;
        }

        /* Location Data Row */
        #location-panel {
            padding: 20px;
            display: flex; align-items: center; gap: 20px;
        }

        #mini-map { 
            width: 120px; height: 120px; 
            border-radius: 15px; flex-shrink: 0; 
            border: 1px solid rgba(255,255,255,0.2);
        }

        .meta-data { flex: 1; min-width: 0; }
        .meta-data h2 { margin: 0; font-size: 20px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .meta-data p { margin: 8px 0 0; font-size: 13px; line-height: 1.4; font-family: monospace; opacity: 0.9; }
        .flag { font-size: 22px; margin-left: 8px; }

        /* Controls Row */
        #controls-row {
            height: 100px;
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .shutter-btn-outer {
            width: 75px; height: 75px; border-radius: 50%; border: 3px solid #fff;
            display: flex; align-items: center; justify-content: center;
        }
        #shutter-btn {
            width: 62px; height: 62px; background: #fff; border-radius: 50%; border: none;
        }
        #shutter-btn:active { transform: scale(0.9); background: #ccc; }

        .btn-action {
            width: 50px; height: 50px; background: rgba(255,255,255,0.1);
            border: none; border-radius: 50%; color: #fff; font-size: 20px;
            display: flex; align-items: center; justify-content: center; position: relative;
        }

        #batch-count {
            position: absolute; top: -5px; right: -5px; background: #ff3b30;
            font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 10px;
        }

        /* Zoom Slider Overlay */
        #zoom-bar {
            position: absolute; left: 15px; top: 100px; bottom: 320px;
            display: flex; flex-direction: column; align-items: center; z-index: 100;
        }
        #zoom-input {
            appearance: none; width: 5px; height: 100%; background: rgba(255,255,255,0.2);
            border-radius: 5px; -webkit-appearance: slider-vertical;
        }

        .flash {
            position: fixed; inset: 0; background: #fff; z-index: 200;
            opacity: 0; pointer-events: none;
        }
        .flash.active { animation: flashEffect 0.15s; }
        @keyframes flashEffect { 0% { opacity: 0; } 50% { opacity: 0.8; } 100% { opacity: 0; } }
        @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        canvas { display: none; }
    </style>
</head>
<body>

<div id="flash" class="flash"></div>

<div id="viewport">
    <video id="video" autoplay playsinline muted></video>

    <div id="sidebar"></div>

    <div id="zoom-bar">
        <span style="font-size: 18px; margin-bottom: 10px;">+</span>
        <input type="range" id="zoom-input" min="1" max="10" step="0.1" value="1">
        <span style="font-size: 18px; margin-top: 10px;">-</span>
    </div>

    <div id="bottom-dashboard">
        <div id="location-panel">
            <div id="mini-map"></div>
            <div class="meta-data">
                <h2 id="ui-main-loc">Bengaluru, Karnataka <span class="flag">🇮🇳</span></h2>
                <p id="ui-sub-loc">Fetching address details...</p>
                <p>
                    <b>LAT:</b> <span id="ui-lat">0.000000</span>° | <b>LONG:</b> <span id="ui-lon">0.000000</span>°<br>
                    <span id="ui-time">-- : -- : --</span>
                </p>
            </div>
        </div>
        
        <div id="controls-row">
            <button class="btn-action" onclick="switchCamera()">🔄</button>
            <div class="shutter-btn-outer">
                <button id="shutter-btn"></button>
            </div>
            <button class="btn-action" onclick="zipAndDownload()">
                📦 <div id="batch-count">0</div>
            </button>
        </div>
    </div>
</div>

<canvas id="canvas-proc"></canvas>

<script>
    let stream = null;
    let mode = "environment";
    let photos = [];
    let map, marker;
    let zoom = 1;

    const v = document.getElementById('video');
    const badge = document.getElementById('batch-count');
    const side = document.getElementById('sidebar');

    async function initCam() {
        if (stream) stream.getTracks().forEach(t => t.stop());
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: mode, width: { ideal: 3840 }, height: { ideal: 2160 } }
            });
            v.srcObject = stream;
        } catch (e) { alert("Enable Camera Access"); }
    }

    function switchCamera() {
        mode = (mode === "environment") ? "user" : "environment";
        initCam();
    }

    // Volume Button Support
    window.addEventListener('keydown', (e) => {
        if (e.key.includes("Volume")) {
            e.preventDefault();
            takeSnap();
        }
    });

    function initGPS() {
        navigator.geolocation.watchPosition(async (p) => {
            const { latitude, longitude } = p.coords;
            document.getElementById('ui-lat').innerText = latitude.toFixed(6);
            document.getElementById('ui-lon').innerText = longitude.toFixed(6);
            document.getElementById('ui-time').innerText = new Date().toLocaleString('en-GB', { 
                weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric', 
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true 
            }).toUpperCase() + " GMT +05:30";

            if (!map) {
                map = L.map('mini-map', { zoomControl: false, attributionControl: false }).setView([latitude, longitude], 17);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                marker = L.marker([latitude, longitude]).addTo(map);
            } else {
                map.setView([latitude, longitude]);
                marker.setLatLng([latitude, longitude]);
            }

            try {
                const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                const d = await r.json();
                document.getElementById('ui-main-loc').innerHTML = `${d.address.city || d.address.state}, India <span class="flag">🇮🇳</span>`;
                document.getElementById('ui-sub-loc').innerText = d.display_name.split(',').slice(0, 3).join(',');
            } catch (e) {}
        }, null, { enableHighAccuracy: true });
    }

    document.getElementById('zoom-input').oninput = (e) => {
        zoom = e.target.value;
        v.style.transform = `scale(${zoom})`;
    };

    async function takeSnap() {
        const flash = document.getElementById('flash');
        flash.classList.add('active');
        setTimeout(() => flash.classList.remove('active'), 150);

        const c = document.getElementById('canvas-proc');
        const ctx = c.getContext('2d');
        c.width = v.videoWidth;
        c.height = v.videoHeight;

        const sw = v.videoWidth / zoom;
        const sh = v.videoHeight / zoom;
        const sx = (v.videoWidth - sw) / 2;
        const sy = (v.videoHeight - sh) / 2;
        
        ctx.drawImage(v, sx, sy, sw, sh, 0, 0, c.width, c.height);
        const blob = await new Promise(r => c.toBlob(r, 'image/jpeg', 0.95));
        
        // Instant Sidebar Thumb
        const t = document.createElement('img');
        t.src = URL.createObjectURL(blob);
        t.className = 'thumb';
        side.prepend(t);

        // Process final version with Full Width Bar
        renderFinal(blob);
    }

    document.getElementById('shutter-btn').onclick = takeSnap;

    async function renderFinal(blob) {
        const panel = document.getElementById('location-panel');
        const panelImg = await html2canvas(panel, { useCORS: true, scale: 2, backgroundColor: 'rgba(0,0,0,0.7)' });

        const finalC = document.createElement('canvas');
        finalC.width = v.videoWidth;
        finalC.height = v.videoHeight;
        const fctx = finalC.getContext('2d');

        const img = new Image();
        img.src = URL.createObjectURL(blob);
        await new Promise(r => img.onload = r);

        fctx.drawImage(img, 0, 0);

        // Draw Full Width Bar at bottom
        const barH = finalC.height * 0.18;
        fctx.drawImage(panelImg, 0, finalC.height - barH, finalC.width, barH);

        const finalBlob = await new Promise(r => finalC.toBlob(r, 'image/jpeg', 0.9));
        photos.push(finalBlob);
        badge.innerText = photos.length;
    }

    async function zipAndDownload() {
        if (photos.length === 0) return alert("Shoot some pics first!");
        const zip = new JSZip();
        photos.forEach((b, i) => zip.file(`GPS_PIC_${i+1}.jpg`, b));
        const blob = await zip.generateAsync({type:"blob"});
        const l = document.createElement('a');
        l.href = URL.createObjectURL(blob);
        l.download = `GPS_BATCH_${Date.now()}.zip`;
        l.click();
        photos = [];
        badge.innerText = "0";
        side.innerHTML = "";
    }

    initCam();
    initGPS();
</script>

</body>
</html>
